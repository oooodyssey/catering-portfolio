<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catering Portfolio</title>

  <!-- Google Fonts: 見出し用の上品なセリフ体 + 日本語フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       リセット & 基本設定
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* カラーパレット（ここを変えると全体の色が変わります） */
    :root {
      --color-bg:           #FFF8F3;   /* 背景：桜色がかったクリーム */
      --color-dark:         #3D2A22;   /* メインの文字色：温かみのあるブラウン */
      --color-accent:       #C8856A;   /* アクセント：テラコッタサーモン */
      --color-accent-light: #F5E3D9;   /* アクセントの薄い版：ホバー背景など */
      --color-card-bg:      #FFFAF7;   /* カードの背景：ほんのり温かい白 */
      --color-overlay:      rgba(45, 22, 12, 0.48); /* 動画の上の暗いフィルター */
      --font-serif:         'Cormorant Garamond', serif;
      --font-sans:          'Noto Sans JP', sans-serif;
      --border-radius:      20px;      /* カードの角丸（丸めにしてかわいく） */
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-dark);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
    }


    /* =========================================================
       ヘッダー（ナビゲーション）
       ========================================================= */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(255, 248, 243, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200, 133, 106, 0.15); /* アクセント色の細いライン */
    }

    .site-name {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--color-dark);
      text-decoration: none;
    }

    .instagram-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--color-accent);   /* アクセント色に変更 */
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      transition: opacity 0.3s;
    }

    .instagram-link:hover {
      opacity: 0.7;
    }

    .instagram-link svg {
      width: 20px;
      height: 20px;
    }


    /* =========================================================
       ヒーローセクション（動画エリア）
       ========================================================= */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: var(--color-overlay);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      color: #fff;
    }

    .hero-label {
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 5.5rem);
      font-weight: 300;
      line-height: 1.15;
      letter-spacing: 0.06em;
      margin-bottom: 28px;
    }

    /* サブタイトルをイタリックにして上品さをプラス */
    .hero-subtitle {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.1em;
      opacity: 0.85;
    }

    /* 動画がない場合の代替背景：温かみのあるグラデーション */
    .hero-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(145deg, #3D2A22 0%, #7A4535 60%, #C8856A 100%);
    }


    /* =========================================================
       ポートフォリオセクション
       ========================================================= */
    .portfolio {
      padding: 96px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* セクション見出し */
    .section-heading {
      text-align: center;
      margin-bottom: 64px;
    }

    /* ラベルの両側に細いラインを追加（かわいいアクセント） */
    .section-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 0.68rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 14px;
    }

    .section-label::before,
    .section-label::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--color-accent);
      opacity: 0.5;
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* カードのグリッド（3列） */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    /* 個々のカード */
    .portfolio-card {
      background: var(--color-card-bg);
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(200, 133, 106, 0.12); /* 薄いアクセント色のボーダー */
      box-shadow: 0 4px 20px rgba(200, 133, 106, 0.08);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    /* ホバー時：浮き上がる＋ピンクがかった影 */
    .portfolio-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 48px rgba(200, 133, 106, 0.22);
    }

    .card-image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .portfolio-card:hover .card-image-wrap img {
      transform: scale(1.06);
    }

    .card-body {
      padding: 18px 22px 0;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      line-height: 1.6;
    }

    /* View More ボタン：アクセント色に */
    .card-footer {
      display: flex;
      justify-content: flex-end;
      padding: 14px 22px 18px;
    }

    .btn-view-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-accent);   /* テラコッタ色 */
      color: #fff;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 9px 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn-view-more:hover {
      background: #B5745A;   /* 少し濃いテラコッタ */
      transform: scale(1.03);
    }

    .btn-view-more .arrow {
      font-size: 0.9rem;
      transition: transform 0.3s;
    }

    .btn-view-more:hover .arrow {
      transform: translateX(3px);
    }


    /* =========================================================
       ライトボックス（クリック時に開く詳細モーダル）
       ========================================================= */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(30, 15, 8, 0.82);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .lightbox.is-open {
      display: flex;
    }

    .lightbox-modal {
      background: var(--color-bg);
      border-radius: var(--border-radius);
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.96) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--color-accent-light);
      color: var(--color-accent);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: background 0.3s;
    }

    .lightbox-close:hover {
      background: rgba(200, 133, 106, 0.3);
    }

    .lightbox-main-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--border-radius) var(--border-radius) 0 0;
      display: block;
    }

    .lightbox-thumbs {
      display: flex;
      gap: 8px;
      padding: 12px 24px 0;
      overflow-x: auto;
    }

    .lightbox-thumbs button {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border: 2px solid transparent;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: none;
      transition: border-color 0.25s;
    }

    .lightbox-thumbs button.active {
      border-color: var(--color-accent);
    }

    .lightbox-thumbs button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lightbox-info {
      padding: 24px 32px 32px;
    }

    .lightbox-title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .lightbox-desc {
      font-size: 0.9rem;
      line-height: 1.9;
      color: #7A5C50;
    }


    /* =========================================================
       フッター
       ========================================================= */
    footer {
      text-align: center;
      padding: 56px 24px 48px;
      border-top: 1px solid rgba(200, 133, 106, 0.2);
      background: #FFF3EC;   /* フッターだけ少し濃いクリーム */
    }

    .footer-instagram {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--color-accent);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      padding: 14px 36px;
      border: 1.5px solid var(--color-accent);
      border-radius: 30px;
      transition: all 0.3s;
      margin-bottom: 28px;
    }

    .footer-instagram:hover {
      background: var(--color-accent);
      color: #fff;
    }

    .footer-copy {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #B8998D;
    }


    /* =========================================================
       レスポンシブ対応（スマホ・タブレット）
       ========================================================= */
    @media (max-width: 900px) {
      .portfolio-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      header {
        padding: 16px 20px;
      }

      .portfolio {
        padding: 72px 20px;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
      }

      .lightbox-info {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- =========================================================
       ヘッダー
       ※ サイト名とInstagramリンクを変更してください
       ========================================================= -->
  <header>
    <a href="#" class="site-name">Catering Portfolio</a>

    <!-- ★ Instagram URLをあなたのアカウントに変更してください -->
    <a href="https://www.instagram.com/catering.portfolio.demo/" target="_blank" rel="noopener" class="instagram-link">
      <!-- Instagram SVGアイコン（画像なしでも表示できる） -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Instagram
    </a>
  </header>


  <!-- =========================================================
       ヒーローセクション（動画）
       ========================================================= -->
  <section class="hero">

    <!--
      ★ 動画の差し替え方：
        1. 動画ファイル（.mp4 推奨）を同じフォルダに入れる
        2. src="your-video.mp4" の部分を変更する
        3. 動画がない場合は <video> タグを削除してもOK（グラデーション背景になる）

      autoplay : 自動再生
      muted    : 音消し（自動再生にはmutedが必要）
      loop     : ループ再生
      playsinline : iPhoneで全画面にならず背景として再生
    -->
    <div class="hero-placeholder"></div><!-- 動画読み込み中の代替背景 -->

    <!--
      ★ 動画の差し替え方：
        1. 動画ファイル（.mp4）を同じフォルダに入れる
        2. src の URL を "自分の動画.mp4" に書き換えるだけ

      autoplay    : 自動再生
      muted       : 音消し（自動再生にはmutedが必要）
      loop        : ループ再生
      playsinline : iPhoneで全画面にならず背景として再生
    -->
    <video class="hero-video" autoplay muted loop playsinline>
      <!-- ★ ここのURLを自分の動画ファイルに変更する -->
      <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <p class="hero-label">Catering &amp; Food Creation</p>
      <!-- ★ タイトルを変更してください -->
      <h1 class="hero-title">試作品<br>ポートフォリオ</h1>
      <p class="hero-subtitle">Handcrafted · One by One</p>
    </div>

  </section>


  <!-- =========================================================
       ポートフォリオ一覧
       ========================================================= -->
  <main>
    <section class="portfolio">

      <div class="section-heading">
        <p class="section-label">Portfolio</p>
        <h2 class="section-title">作品一覧</h2>
      </div>

      <!-- カードグリッド（JavaScriptで自動生成） -->
      <div class="portfolio-grid" id="portfolioGrid"></div>

    </section>
  </main>


  <!-- =========================================================
       フッター
       ========================================================= -->
  <footer>
    <!-- ★ Instagram URLをあなたのアカウントに変更してください -->
    <a href="https://www.instagram.com/catering.portfolio.demo/" target="_blank" rel="noopener" class="footer-instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Instagramでチェック
    </a>
    <!-- ★ あなたの名前に変更してください -->
    <p class="footer-copy">&copy; 2025 Your Name. All rights reserved.</p>
  </footer>


  <!-- =========================================================
       ライトボックス（詳細モーダル）— この部分は触らなくてOK
       ========================================================= -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-modal" id="lightboxModal">
      <button class="lightbox-close" id="lightboxClose" aria-label="閉じる">&times;</button>
      <img src="" alt="" class="lightbox-main-image" id="lightboxMainImage">
      <div class="lightbox-thumbs" id="lightboxThumbs"></div>
      <div class="lightbox-info">
        <h3 class="lightbox-title" id="lightboxTitle"></h3>
        <p class="lightbox-desc" id="lightboxDesc"></p>
      </div>
    </div>
  </div>


  <!-- =========================================================
       JavaScript
       ========================================================= -->
  <script>
    /*
    ============================================================
    ★★★ ここが一番大事！作品データを追加・編集してください ★★★
    ============================================================

    各作品は {} で囲まれた1つのオブジェクトです。
    , (カンマ) で区切って作品を追加していきます。

    各項目の説明：
      title   : 作品名
      thumb   : 一覧に表示するサムネイル画像のパス
      images  : 詳細で表示する画像の配列（複数入れるとスライドになる）
      desc    : 詳細に表示する説明文

    画像ファイルの置き方：
      1. このHTMLと同じフォルダに "images" フォルダを作る
      2. 画像を入れる
      3. パスを "images/ファイル名.jpg" のように書く
    ============================================================
    */
    /*
      ★ 画像の差し替え方：
        "https://picsum.photos/..." の部分を自分の画像パスに変更する
        例: "images/sushi-1.jpg"  （同じフォルダに images/ フォルダを作って画像を入れる）

      ★ Instagramは HTML内の "catering.portfolio.demo" を自分のIDに変更する（2箇所）
    */
    const works = [
      {
        title: "【Live】出張寿司職人",
        thumb: "https://picsum.photos/seed/sushi1/800/600",
        images: [
          "https://picsum.photos/seed/sushi1/1200/800",
          "https://picsum.photos/seed/sushi2/1200/800",
          "https://picsum.photos/seed/sushi3/1200/800"
        ],
        desc: "新鮮な食材を目の前で握る出張寿司。ゲストの目を楽しませながら、できたての一貫をお届けします。試作では握り方・ネタの組み合わせ・演出を検討しました。"
      },
      {
        title: "【Live】マグロ解体ショー",
        thumb: "https://picsum.photos/seed/maguro1/800/600",
        images: [
          "https://picsum.photos/seed/maguro1/1200/800",
          "https://picsum.photos/seed/maguro2/1200/800"
        ],
        desc: "豪快なマグロ解体ショーは会場を一気に盛り上げます。解体後はすぐにお刺身やにぎり寿司としてゲストへ振る舞うことを想定しています。"
      },
      {
        title: "【Live】ローストビーフカッティングサービス",
        thumb: "https://picsum.photos/seed/beef1/800/600",
        images: [
          "https://picsum.photos/seed/beef1/1200/800",
          "https://picsum.photos/seed/beef2/1200/800"
        ],
        desc: "丁寧に火入れしたローストビーフを目の前でスライス。ゲストのお皿に直接盛り付けるライブサービス形式の試作です。"
      },
      {
        title: "オーダーメイドケーキ",
        thumb: "https://picsum.photos/seed/cake1/800/600",
        images: [
          "https://picsum.photos/seed/cake1/1200/800",
          "https://picsum.photos/seed/cake2/1200/800"
        ],
        desc: "イベントのテーマやゲストに合わせてデザインするオーダーメイドケーキ。装飾・フレーバー・サイズのカスタマイズ対応を検討中です。"
      },
      {
        title: "【Live】たこ焼き屋台",
        thumb: "https://picsum.photos/seed/tako1/800/600",
        images: [
          "https://picsum.photos/seed/tako1/1200/800",
          "https://picsum.photos/seed/tako2/1200/800"
        ],
        desc: "会場に屋台を設置してその場で焼き立てを提供。外はカリッと中はとろっとした本格たこ焼きをゲストに楽しんでいただく演出です。"
      },
      {
        title: "巻き寿司 〜マグロたたきのせ〜",
        thumb: "https://picsum.photos/seed/maki1/800/600",
        images: [
          "https://picsum.photos/seed/maki1/1200/800",
          "https://picsum.photos/seed/maki2/1200/800"
        ],
        desc: "彩り豊かなカリフォルニアロールスタイルの巻き寿司。マグロのたたきをトッピングしたビジュアル重視の試作品です。"
      }
      /* ★ 作品を追加する場合はここに , { ... } を書き足す */
    ];


    /*
    ============================================================
    以下はサイトを動かすプログラムです。
    基本的に触る必要はありません。
    ============================================================
    */

    /* --- カードを自動生成する --- */
    const grid = document.getElementById("portfolioGrid");

    works.forEach(function(work, index) {
      /* カードのHTMLを作る */
      const card = document.createElement("div");
      card.className = "portfolio-card";
      card.innerHTML = `
        <div class="card-image-wrap">
          <img src="${work.thumb}" alt="${work.title}" loading="lazy"
               onerror="this.style.background='#e8e0d8'; this.style.minHeight='200px';">
        </div>
        <div class="card-body">
          <h3 class="card-title">${work.title}</h3>
        </div>
        <div class="card-footer">
          <button class="btn-view-more">
            View More <span class="arrow">›</span>
          </button>
        </div>
      `;

      /* クリックするとライトボックスを開く */
      card.addEventListener("click", function() {
        openLightbox(index);
      });

      grid.appendChild(card);
    });


    /* --- ライトボックスの開閉 --- */
    const lightbox      = document.getElementById("lightbox");
    const lightboxTitle = document.getElementById("lightboxTitle");
    const lightboxDesc  = document.getElementById("lightboxDesc");
    const mainImage     = document.getElementById("lightboxMainImage");
    const thumbsWrap    = document.getElementById("lightboxThumbs");
    const closeBtn      = document.getElementById("lightboxClose");

    /* ライトボックスを開く */
    function openLightbox(index) {
      const work = works[index];

      lightboxTitle.textContent = work.title;
      lightboxDesc.textContent  = work.desc;

      /* サムネイルを作る */
      thumbsWrap.innerHTML = "";
      work.images.forEach(function(src, i) {
        const btn = document.createElement("button");
        btn.innerHTML = `<img src="${src}" alt="${work.title} ${i + 1}">`;
        if (i === 0) {
          btn.classList.add("active");
          mainImage.src = src;
          mainImage.alt = work.title;
        }
        /* サムネをクリックするとメイン画像が切り替わる */
        btn.addEventListener("click", function(e) {
          e.stopPropagation(); /* カード全体のクリックに伝わらないようにする */
          mainImage.src = src;
          thumbsWrap.querySelectorAll("button").forEach(function(b) {
            b.classList.remove("active");
          });
          btn.classList.add("active");
        });
        thumbsWrap.appendChild(btn);
      });

      /* サムネが1枚だけの場合はサムネ欄を隠す */
      thumbsWrap.style.display = work.images.length > 1 ? "flex" : "none";

      lightbox.classList.add("is-open");
      document.body.style.overflow = "hidden"; /* 背景のスクロールを止める */
    }

    /* ライトボックスを閉じる */
    function closeLightbox() {
      lightbox.classList.remove("is-open");
      document.body.style.overflow = "";
    }

    /* 閉じるボタン */
    closeBtn.addEventListener("click", closeLightbox);

    /* 背景（暗い部分）をクリックしても閉じる */
    lightbox.addEventListener("click", function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    /* Escキーでも閉じる */
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeLightbox();
    });
  </script>

</body>
</html>
