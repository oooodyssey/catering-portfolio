<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catering Portfolio</title>

  <!-- Google Fonts: 見出し用の上品なセリフ体 + 日本語フォント -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* =========================================================
       リセット & 基本設定
       ========================================================= */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* カラーパレット（変数として定義しておくと後で色変更が楽） */
    :root {
      --color-bg:      #FAF8F4;   /* 背景：温かみのあるクリーム */
      --color-dark:    #2B1F18;   /* メインの文字色：深いブラウン */
      --color-accent:  #8B6F47;   /* アクセント：テラコッタブラウン */
      --color-card-bg: #FFFFFF;   /* カードの背景：白 */
      --color-overlay: rgba(43, 31, 24, 0.55); /* 動画の上の暗いフィルター */
      --font-serif:    'Cormorant Garamond', serif;
      --font-sans:     'Noto Sans JP', sans-serif;
      --border-radius: 12px;      /* カードの角丸 */
    }

    html {
      scroll-behavior: smooth; /* ページ内リンクをなめらかにスクロール */
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-dark);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
    }


    /* =========================================================
       ヘッダー（ナビゲーション）
       ========================================================= */
    header {
      position: fixed;           /* 画面上部に固定 */
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;              /* 他の要素より前に表示 */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(250, 248, 244, 0.9);
      backdrop-filter: blur(8px); /* すりガラス効果 */
      border-bottom: 1px solid rgba(43, 31, 24, 0.08);
    }

    /* サイト名（ロゴ部分） */
    .site-name {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--color-dark);
      text-decoration: none;
    }

    /* Instagramアイコンリンク */
    .instagram-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--color-dark);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    .instagram-link:hover {
      opacity: 1;
    }

    /* InstagramのSVGアイコン */
    .instagram-link svg {
      width: 20px;
      height: 20px;
    }


    /* =========================================================
       ヒーローセクション（動画エリア）
       ========================================================= */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;             /* 画面の高さ全体 */
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* 背景動画 */
    .hero-video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;         /* 画面全体を埋めるようにトリミング */
    }

    /* 動画の上にかぶせる暗いフィルター */
    .hero-overlay {
      position: absolute;
      inset: 0;                  /* top:0; left:0; right:0; bottom:0; の省略 */
      background: var(--color-overlay);
    }

    /* ヒーローの文字（動画・フィルターより前に表示） */
    .hero-content {
      position: relative;
      z-index: 1;
      color: #fff;
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.5rem, 6vw, 5rem); /* 画面幅に合わせてサイズが変わる */
      font-weight: 300;
      line-height: 1.2;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }

    .hero-subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      opacity: 0.8;
    }

    /* 動画がない場合の代替背景色 */
    .hero-placeholder {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #2B1F18 0%, #5C3D2E 100%);
    }


    /* =========================================================
       ポートフォリオセクション
       ========================================================= */
    .portfolio {
      padding: 96px 48px;
      max-width: 1200px;
      margin: 0 auto;            /* 左右中央揃え */
    }

    /* セクション見出し */
    .section-heading {
      text-align: center;
      margin-bottom: 64px;
    }

    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 12px;
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* カードのグリッド（3列） */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* 3等分 */
      gap: 28px;
    }

    /* 個々のカード */
    .portfolio-card {
      background: var(--color-card-bg);
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;           /* クリックできることを示す手のカーソル */
      box-shadow: 0 2px 16px rgba(43, 31, 24, 0.08);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    /* ホバー時：少し浮き上がる */
    .portfolio-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(43, 31, 24, 0.16);
    }

    /* カード内の画像エリア */
    .card-image-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4 / 3;       /* 横4：縦3の比率を保つ */
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    /* ホバー時：画像をわずかに拡大 */
    .portfolio-card:hover .card-image-wrap img {
      transform: scale(1.06);
    }

    /* カードのテキスト部分 */
    .card-body {
      padding: 20px 24px 0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.03em;
      line-height: 1.5;
    }

    /* "View More" ボタン */
    .card-footer {
      display: flex;
      justify-content: flex-end;
      padding: 16px 24px 20px;
    }

    .btn-view-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-dark);
      color: #fff;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-view-more:hover {
      background: var(--color-accent);
    }

    /* ボタン内の矢印 */
    .btn-view-more .arrow {
      font-size: 0.9rem;
      transition: transform 0.3s;
    }

    .btn-view-more:hover .arrow {
      transform: translateX(3px);
    }


    /* =========================================================
       ライトボックス（クリック時に開く詳細モーダル）
       ========================================================= */
    .lightbox {
      display: none;             /* 初期状態は非表示 */
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(20, 14, 10, 0.88);
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* .is-open クラスが付いたら表示 */
    .lightbox.is-open {
      display: flex;
    }

    /* モーダルの白い枠 */
    .lightbox-modal {
      background: var(--color-bg);
      border-radius: var(--border-radius);
      width: 100%;
      max-width: 900px;
      max-height: 90vh;
      overflow-y: auto;          /* 縦方向にスクロール可能 */
      position: relative;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(0.96) translateY(12px); }
      to   { opacity: 1; transform: scale(1)    translateY(0); }
    }

    /* 閉じるボタン (×) */
    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(43, 31, 24, 0.12);
      color: var(--color-dark);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      transition: background 0.3s;
    }

    .lightbox-close:hover {
      background: rgba(43, 31, 24, 0.25);
    }

    /* メイン画像（大きく表示） */
    .lightbox-main-image {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--border-radius) var(--border-radius) 0 0;
      display: block;
    }

    /* サムネイル列（複数写真がある場合） */
    .lightbox-thumbs {
      display: flex;
      gap: 8px;
      padding: 12px 24px 0;
      overflow-x: auto;          /* 横スクロール可能 */
    }

    .lightbox-thumbs button {
      flex-shrink: 0;
      width: 72px;
      height: 72px;
      border: 2px solid transparent;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: none;
      transition: border-color 0.25s;
    }

    .lightbox-thumbs button.active {
      border-color: var(--color-accent);
    }

    .lightbox-thumbs button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* テキスト部分 */
    .lightbox-info {
      padding: 24px 32px 32px;
    }

    .lightbox-title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 12px;
      letter-spacing: 0.03em;
    }

    .lightbox-desc {
      font-size: 0.9rem;
      line-height: 1.9;
      color: #5a4a3a;
    }


    /* =========================================================
       フッター
       ========================================================= */
    footer {
      text-align: center;
      padding: 48px 24px;
      border-top: 1px solid rgba(43, 31, 24, 0.1);
    }

    .footer-instagram {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--color-dark);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      padding: 14px 32px;
      border: 1px solid rgba(43, 31, 24, 0.3);
      border-radius: 30px;
      transition: all 0.3s;
      margin-bottom: 32px;
      display: inline-flex;
    }

    .footer-instagram:hover {
      background: var(--color-dark);
      color: #fff;
    }

    .footer-copy {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #999;
    }


    /* =========================================================
       レスポンシブ対応（スマホ・タブレット）
       ========================================================= */
    @media (max-width: 900px) {
      /* タブレット：2列 */
      .portfolio-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      /* スマホ：1列 */
      header {
        padding: 16px 20px;
      }

      .portfolio {
        padding: 72px 20px;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
      }

      .lightbox-info {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- =========================================================
       ヘッダー
       ※ サイト名とInstagramリンクを変更してください
       ========================================================= -->
  <header>
    <a href="#" class="site-name">Catering Portfolio</a>

    <!-- ★ Instagram URLをあなたのアカウントに変更してください -->
    <a href="https://www.instagram.com/catering.portfolio.demo/" target="_blank" rel="noopener" class="instagram-link">
      <!-- Instagram SVGアイコン（画像なしでも表示できる） -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Instagram
    </a>
  </header>


  <!-- =========================================================
       ヒーローセクション（動画）
       ========================================================= -->
  <section class="hero">

    <div class="hero-placeholder"></div><!-- 動画読み込み中の代替背景 -->

    <!--
      ★★★ 動画の更新方法 ★★★
        1. 撮影した動画を "videos" フォルダに入れる
        2. ファイル名を "hero.mp4" にする（または下の src を変更）
        3. それだけで完了！

      注意: GitHubは100MB超のファイルはアップできません。
            動画が大きい場合は圧縮してから使ってください。
    -->
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="videos/hero.mp4" type="video/mp4">
      <!-- ↑ 自分の動画を入れたら上の行が使われます -->
      <!-- 動画がない間は仮の動画を使います ↓ -->
      <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <div class="hero-content">
      <p class="hero-label">Catering &amp; Food Creation</p>
      <!-- ★ タイトルを変更してください -->
      <h1 class="hero-title">試作品<br>ポートフォリオ</h1>
      <p class="hero-subtitle">Handcrafted · One by One</p>
    </div>

  </section>


  <!-- =========================================================
       ポートフォリオ一覧
       ========================================================= -->
  <main>
    <section class="portfolio">

      <div class="section-heading">
        <p class="section-label">Portfolio</p>
        <h2 class="section-title">作品一覧</h2>
      </div>

      <!-- カードグリッド（JavaScriptで自動生成） -->
      <div class="portfolio-grid" id="portfolioGrid"></div>

    </section>
  </main>


  <!-- =========================================================
       フッター
       ========================================================= -->
  <footer>
    <!-- ★ Instagram URLをあなたのアカウントに変更してください -->
    <a href="https://www.instagram.com/catering.portfolio.demo/" target="_blank" rel="noopener" class="footer-instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      Instagramでチェック
    </a>
    <!-- ★ あなたの名前に変更してください -->
    <p class="footer-copy">&copy; 2025 Your Name. All rights reserved.</p>
  </footer>


  <!-- =========================================================
       ライトボックス（詳細モーダル）— この部分は触らなくてOK
       ========================================================= -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <div class="lightbox-modal" id="lightboxModal">
      <button class="lightbox-close" id="lightboxClose" aria-label="閉じる">&times;</button>
      <img src="" alt="" class="lightbox-main-image" id="lightboxMainImage">
      <div class="lightbox-thumbs" id="lightboxThumbs"></div>
      <div class="lightbox-info">
        <h3 class="lightbox-title" id="lightboxTitle"></h3>
        <p class="lightbox-desc" id="lightboxDesc"></p>
      </div>
    </div>
  </div>


  <!-- =========================================================
       JavaScript
       ========================================================= -->
  <script>
    /*
    ============================================================
    ★★★ 作品を追加・更新するときはここだけ編集！ ★★★
    ============================================================

    【画像の更新手順】
      1. 写真を "images" フォルダに入れる（例: sushi-1.jpg）
      2. 下の thumb と images のパスを "images/sushi-1.jpg" に書き換える
      3. GitHubにアップロードすればサイトに反映される

    【作品を追加する手順】
      1. 下のリストの末尾に , { ... } を追加する
      2. 画像を images フォルダに入れる
      3. GitHubにアップロードして完了

    各項目の説明：
      title  : カードに表示する作品名
      thumb  : 一覧のサムネイル画像（1枚）
      images : 詳細で表示する画像（複数枚OK → スライドになる）
      desc   : 詳細に表示する説明文
    ============================================================
    */
    const works = [
      {
        title: "【Live】出張寿司職人",
        thumb: "images/sushi-thumb.jpg",          /* ← 仮：写真が来たら差し替え */
        images: [
          "images/sushi-1.jpg",                   /* ← 仮：写真が来たら差し替え */
          "images/sushi-2.jpg",
          "images/sushi-3.jpg"
        ],
        desc: "新鮮な食材を目の前で握る出張寿司。ゲストの目を楽しませながら、できたての一貫をお届けします。試作では握り方・ネタの組み合わせ・演出を検討しました。"
      },
      {
        title: "【Live】マグロ解体ショー",
        thumb: "images/maguro-thumb.jpg",
        images: [
          "images/maguro-1.jpg",
          "images/maguro-2.jpg"
        ],
        desc: "豪快なマグロ解体ショーは会場を一気に盛り上げます。解体後はすぐにお刺身やにぎり寿司としてゲストへ振る舞うことを想定しています。"
      },
      {
        title: "【Live】ローストビーフカッティングサービス",
        thumb: "images/roastbeef-thumb.jpg",
        images: [
          "images/roastbeef-1.jpg",
          "images/roastbeef-2.jpg"
        ],
        desc: "丁寧に火入れしたローストビーフを目の前でスライス。ゲストのお皿に直接盛り付けるライブサービス形式の試作です。"
      },
      {
        title: "オーダーメイドケーキ",
        thumb: "images/cake-thumb.jpg",
        images: [
          "images/cake-1.jpg",
          "images/cake-2.jpg"
        ],
        desc: "イベントのテーマやゲストに合わせてデザインするオーダーメイドケーキ。装飾・フレーバー・サイズのカスタマイズ対応を検討中です。"
      },
      {
        title: "【Live】たこ焼き屋台",
        thumb: "images/takoyaki-thumb.jpg",
        images: [
          "images/takoyaki-1.jpg",
          "images/takoyaki-2.jpg"
        ],
        desc: "会場に屋台を設置してその場で焼き立てを提供。外はカリッと中はとろっとした本格たこ焼きをゲストに楽しんでいただく演出です。"
      },
      {
        title: "巻き寿司 〜マグロたたきのせ〜",
        thumb: "images/makizushi-thumb.jpg",
        images: [
          "images/makizushi-1.jpg",
          "images/makizushi-2.jpg"
        ],
        desc: "彩り豊かなカリフォルニアロールスタイルの巻き寿司。マグロのたたきをトッピングしたビジュアル重視の試作品です。"
      }

      /* ★ 作品を追加する場合はここに続けて書く（カンマを忘れずに）：
      ,
      {
        title: "新しい作品名",
        thumb: "images/新作-thumb.jpg",
        images: [
          "images/新作-1.jpg",
          "images/新作-2.jpg"
        ],
        desc: "説明文をここに書く。"
      }
      */
    ];


    /*
    ============================================================
    以下はサイトを動かすプログラムです。
    基本的に触る必要はありません。
    ============================================================
    */

    /* --- カードを自動生成する --- */
    const grid = document.getElementById("portfolioGrid");

    works.forEach(function(work, index) {
      /* カードのHTMLを作る */
      const card = document.createElement("div");
      card.className = "portfolio-card";
      card.innerHTML = `
        <div class="card-image-wrap">
          <img src="${work.thumb}" alt="${work.title}" loading="lazy"
               onerror="this.style.background='#e8e0d8'; this.style.minHeight='200px';">
        </div>
        <div class="card-body">
          <h3 class="card-title">${work.title}</h3>
        </div>
        <div class="card-footer">
          <button class="btn-view-more">
            View More <span class="arrow">›</span>
          </button>
        </div>
      `;

      /* クリックするとライトボックスを開く */
      card.addEventListener("click", function() {
        openLightbox(index);
      });

      grid.appendChild(card);
    });


    /* --- ライトボックスの開閉 --- */
    const lightbox      = document.getElementById("lightbox");
    const lightboxTitle = document.getElementById("lightboxTitle");
    const lightboxDesc  = document.getElementById("lightboxDesc");
    const mainImage     = document.getElementById("lightboxMainImage");
    const thumbsWrap    = document.getElementById("lightboxThumbs");
    const closeBtn      = document.getElementById("lightboxClose");

    /* ライトボックスを開く */
    function openLightbox(index) {
      const work = works[index];

      lightboxTitle.textContent = work.title;
      lightboxDesc.textContent  = work.desc;

      /* サムネイルを作る */
      thumbsWrap.innerHTML = "";
      work.images.forEach(function(src, i) {
        const btn = document.createElement("button");
        btn.innerHTML = `<img src="${src}" alt="${work.title} ${i + 1}">`;
        if (i === 0) {
          btn.classList.add("active");
          mainImage.src = src;
          mainImage.alt = work.title;
        }
        /* サムネをクリックするとメイン画像が切り替わる */
        btn.addEventListener("click", function(e) {
          e.stopPropagation(); /* カード全体のクリックに伝わらないようにする */
          mainImage.src = src;
          thumbsWrap.querySelectorAll("button").forEach(function(b) {
            b.classList.remove("active");
          });
          btn.classList.add("active");
        });
        thumbsWrap.appendChild(btn);
      });

      /* サムネが1枚だけの場合はサムネ欄を隠す */
      thumbsWrap.style.display = work.images.length > 1 ? "flex" : "none";

      lightbox.classList.add("is-open");
      document.body.style.overflow = "hidden"; /* 背景のスクロールを止める */
    }

    /* ライトボックスを閉じる */
    function closeLightbox() {
      lightbox.classList.remove("is-open");
      document.body.style.overflow = "";
    }

    /* 閉じるボタン */
    closeBtn.addEventListener("click", closeLightbox);

    /* 背景（暗い部分）をクリックしても閉じる */
    lightbox.addEventListener("click", function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    /* Escキーでも閉じる */
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeLightbox();
    });
  </script>

</body>
</html>
